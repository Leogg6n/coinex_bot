name: Bot de Trading Automático (Cada 4h)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  run-trading-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 230

    steps:
      - name: Descargar el código
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # CAMBIO IMPORTANTE: Instalamos las librerías manualmente y forzamos la actualización
      - name: Instalar librerías
        run: pip install --upgrade requests python-dotenv numpy

      - name: Crear archivo .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Ejecutar el bot
        run: python bot.py

      - name: Guardar el estado en el repositorio
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática del estado del bot [skip ci]"
          git push
